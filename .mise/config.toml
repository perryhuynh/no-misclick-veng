[tools]
java = "temurin-11"
zizmor = "1.26.1"
lefthook = "2.1.9"
actionlint = "1.7.12"
shellcheck = "0.11.0"

[tasks.build]
description = "Build the plugin"
run = "./gradlew build"

[tasks.test]
description = "Run unit tests"
run = "./gradlew test"

[tasks.runelite]
description = "Launch RuneLite dev client with the plugin"
run = "./gradlew run"

[tasks.lint]
description = "Run RuneLite checkstyle + PMD"
run = "./gradlew checkstyleMain checkstyleTest pmdMain pmdTest"

[tasks.lint-workflows]
description = "Lint GitHub Actions workflows"
run = """
actionlint
zizmor .github/workflows
"""

[hooks]
postinstall = "lefthook install"
